<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L1 — AI软件基础</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #fff;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    #slide-container {
      width: 100%;
      max-width: 960px;
      margin: auto;
    }
    #slide-img {
      width: 100%;
      height: auto;
      display: block;
      border: 2px solid #444;
      border-radius: 4px;
    }
    #controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 14px;
    }
    button {
      background: #0066cc;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 22px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover:not(:disabled) { background: #0052a3; }
    button:disabled { background: #444; cursor: default; }
    #page-info { font-size: 1rem; min-width: 80px; text-align: center; }
    #back-link {
      margin-top: 18px;
      font-size: 0.9rem;
      color: #aaa;
      text-decoration: none;
    }
    #back-link:hover { color: #fff; }
  </style>
</head>
<body>
  <div id="slide-container">
    <img id="slide-img" src="" alt="幻灯片" />
  </div>
  <div id="controls">
    <button id="btn-prev">&#9664; 上一页</button>
    <span id="page-info"></span>
    <button id="btn-next">下一页 &#9654;</button>
  </div>
  <a id="back-link" href="../">← 返回课件列表</a>

  <script>
    const slides = [
      './assets/slide-001.svg',
      './assets/slide-002.svg',
      './assets/slide-003.svg'
    ];

    const total = slides.length;
    let current = 1;

    function clamp(n) {
      return Math.max(1, Math.min(total, n));
    }

    function pageFromHash() {
      const hash = window.location.hash.replace('#', '');
      const n = parseInt(hash, 10);
      return isNaN(n) ? 1 : clamp(n);
    }

    function show(n) {
      current = clamp(n);
      document.getElementById('slide-img').src = slides[current - 1];
      document.getElementById('page-info').textContent = current + ' / ' + total;
      document.getElementById('btn-prev').disabled = current === 1;
      document.getElementById('btn-next').disabled = current === total;
      if (window.location.hash !== '#' + current) {
        history.replaceState(null, '', '#' + current);
      }
    }

    document.getElementById('btn-prev').addEventListener('click', function () {
      show(current - 1);
    });
    document.getElementById('btn-next').addEventListener('click', function () {
      show(current + 1);
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'ArrowLeft')  { e.preventDefault(); show(current - 1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); show(current + 1); }
    });

    window.addEventListener('hashchange', function () {
      show(pageFromHash());
    });

    show(pageFromHash());
  </script>
</body>
</html>
