<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Reveal.js Slide Deck</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/theme/black.css">  
    </head>
    <body>
        <div class="reveal">
            <div class="slides">
                <section>
                    <h1>Welcome to Reveal.js</h1>
                    <p>This is a simple example slide deck.</p>
                </section>
                <section>
                    <h2>Slide 2</h2>
                    <p>Another slide with some content.</p>
                </section>
                <section>
                    <h2>Slide 3</h2>
                    <p>And here's yet another slide.</p>
                </section>
                <section>
                    <h2>Conclusion</h2>
                    <p>Thank you for viewing!</p>
                </section>
            </div>
        </div>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.js"></script>
        <script>
            Reveal.initialize();
        </script>
    </body>
</html>
